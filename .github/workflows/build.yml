name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create --org com.example app

      - name: Copy pubspec
        run: cp pubspec.yaml app/pubspec.yaml

      - name: Copy lib files
        run: |
          cp lib/main.dart app/lib/main.dart
          mkdir -p app/lib/services
          mkdir -p app/lib/providers
          mkdir -p app/lib/screens
          cp lib/services/vpn_service.dart app/lib/services/vpn_service.dart
          cp lib/providers/vpn_provider.dart app/lib/providers/vpn_provider.dart
          cp lib/screens/home_screen.dart app/lib/screens/home_screen.dart

      - name: Build APK
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: flow-vpn-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
